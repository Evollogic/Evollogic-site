<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evollogic - Acesso Restrito</title>
    <style>
        /* Estilos com a pegada Hacker/Dev da Evollogic */
        body { background-color: #0b0b2a; color: #fff; font-family: 'Courier New', monospace; text-align: center; margin-top: 10vh; }
        
        .caixa-login { background: rgba(25, 25, 60, 0.8); border: 2px solid #00d4ff; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0 0 20px rgba(0, 212, 255, 0.3); }
        
        input { padding: 12px; margin: 10px 0; width: 80%; border-radius: 5px; border: 1px solid #00d4ff; background: #050515; color: #00ff88; font-weight: bold; outline: none; }
        
        button { padding: 12px 20px; background: #00d4ff; color: #000; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 85%; font-size: 1.1rem; transition: 0.3s; margin-top: 10px;}
        button:hover { background: #00ff88; box-shadow: 0 0 15px #00ff88; }
        
        #hub-secreto { display: none; margin-top: 50px; } /* O hub começa escondido */
    </style>
</head>
<body>

    <div id="tela-login" class="caixa-login">
        <h1 style="color: #00d4ff; text-shadow: 0 0 10px #00d4ff;">EVOLLOGIC</h1>
        <p style="color: #a0a0d0;">Identifique-se, Tripulante.</p>
        
        <input type="email" id="email" placeholder="E-mail de Acesso"><br>
        <input type="password" id="senha" placeholder="Senha"><br>
        <button id="btn-login">INICIAR SESSÃO</button>
        
        <p id="mensagem-erro" style="color: #ff0055; display: none; font-weight: bold; margin-top: 15px;">❌ Acesso Negado!</p>
    </div>

    <div id="hub-secreto">
        <h1 style="color: #00ff88;">🚀 Bem-vindo ao Controle Central, ADM!</h1>
        <p>A Autenticação do Firebase confirmou a tua identidade.</p>
        <button id="btn-sair" style="background: #ff0055; width: auto; margin-top: 30px;">DESCONECTAR (LOGOUT)</button>
    </div>

    <script type="module">
        // Importando as ferramentas do Firebase direto da nuvem do Google
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // 🔥 ATENÇÃO: COPIE SUAS CHAVES LÁ DO PAINEL DO FIREBASE E COLE AQUI! 🔥
        const firebaseConfig = {
            apiKey: "COLE_SUA_API_KEY_AQUI",
            authDomain: "COLE_SEU_AUTH_DOMAIN_AQUI",
            projectId: "COLE_SEU_PROJECT_ID_AQUI",
            storageBucket: "COLE_SEU_STORAGE_BUCKET_AQUI",
            messagingSenderId: "COLE_SEU_MESSAGING_SENDER_ID_AQUI",
            appId: "COLE_SEU_APP_ID_AQUI"
        };

        // Ligando os motores do Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Pegando os elementos da tela
        const telaLogin = document.getElementById('tela-login');
        const hubSecreto = document.getElementById('hub-secreto');
        const msgErro = document.getElementById('mensagem-erro');

        // FUNÇÃO 1: Ficar "escutando" se tem alguém logado
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Tem alguém logado! Esconde o login e mostra o painel
                telaLogin.style.display = 'none';
                hubSecreto.style.display = 'block';
            } else {
                // Ninguém logado! Esconde o painel e mostra o login
                telaLogin.style.display = 'block';
                hubSecreto.style.display = 'none';
            }
        });

        // FUNÇÃO 2: Botão de Entrar
        document.getElementById('btn-login').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            
            // Tenta fazer o login no servidor do Google
            signInWithEmailAndPassword(auth, email, senha)
                .then((userCredential) => {
                    msgErro.style.display = 'none'; // Se der certo, tira o erro da tela
                })
                .catch((error) => {
                    msgErro.style.display = 'block'; // Se der erro (senha errada), mostra a mensagem
                    console.error("Erro:", error.message);
                });
        });

        // FUNÇÃO 3: Botão de Sair
        document.getElementById('btn-sair').addEventListener('click', () => {
            signOut(auth);
        });
    </script>
</body>
</html>
